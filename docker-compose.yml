version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: recurr_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recurr_db
    ports:
      - "5432:5432"
    volumes:
      - recurr_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: recurr_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  recurr_postgres_data:
